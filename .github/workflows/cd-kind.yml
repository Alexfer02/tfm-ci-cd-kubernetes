name: CD (kind + Helm)

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        shell: bash
        run: |
          echo "sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "git_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Install kind
        uses: engineerd/setup-kind@v0.5.0
        with:
          version: v0.25.0

      - name: Create kind cluster
        run: |
          kind create cluster --name cd-kind --wait 120s

      - name: Configure kubeconfig
        run: |
          kind get kubeconfig --name cd-kind > "$HOME/.kube/config"
          kubectl cluster-info

      - name: Create DockerHub secret
        run: |
          kubectl delete secret dockerhub-creds --ignore-not-found
          kubectl create secret docker-registry dockerhub-creds \
            --docker-server=https://index.docker.io/v1/ \
            --docker-username="${{ secrets.DOCKERHUB_USERNAME }}" \
            --docker-password="${{ secrets.DOCKERHUB_TOKEN }}" \
            --docker-email="dev@example.com"

      - name: Deploy with Helm (image tag = commit short SHA)
        run: |
          helm upgrade --install demo charts/microservicio-devops \
            --set image.tag=${{ steps.meta.outputs.sha_short }} \
            --set env.GIT_SHA=${{ steps.meta.outputs.git_sha }}

      - name: Wait pod ready
        run: |
          kubectl rollout status deployment/microservicio-devops-demo --timeout=180s
          kubectl get pods -l app.kubernetes.io/instance=demo
          kubectl describe pod -l app.kubernetes.io/instance=demo | tail -n 80
